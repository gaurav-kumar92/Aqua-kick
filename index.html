<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
let W=700;const H=420,GW=20,GH=145,GY=(H-GH)/2;
const DRAG=.87,MSPD=2.1,WIN=3,KICK_RANGE=58,CPU_KICK_RANGE=50,KICK_FORCE=12;

// Levels: theme colors + CPU difficulty. Each player-win advances to the next level.
// 6 levels: themed visuals + difficulty curve (CPU speed flat through L3, then +10% per level)
const LEVELS=[
  {name:'DEEP SEA',       theme:'deepsea',   bg1:'#051830',bg2:'#020c1c',cpuSpeed:1.0,  cpuKickMul:0.40,shoot:0.30,approach:0.22,ballDark:false},
  {name:'CORAL REEF',     theme:'deepsea',   bg1:'#051830',bg2:'#020c1c',cpuSpeed:1.0,  cpuKickMul:0.45,shoot:0.32,approach:0.24,ballDark:false},
  {name:'AQUARIUM',       theme:'aquarium',  bg1:'#0a3550',bg2:'#062030',cpuSpeed:1.0,  cpuKickMul:0.50,shoot:0.36,approach:0.27,ballDark:false},
  {name:'TURTLE LAGOON',  theme:'turtles',   bg1:'#0a4050',bg2:'#062c38',cpuSpeed:1.1,  cpuKickMul:0.55,shoot:0.40,approach:0.30,ballDark:false},
  {name:'MANTA SKIES',    theme:'mantas',    bg1:'#0a2545',bg2:'#03101e',cpuSpeed:1.21, cpuKickMul:0.60,shoot:0.45,approach:0.34,ballDark:false},
  {name:'STINGRAY DEEP',  theme:'stingrays', bg1:'#080318',bg2:'#020108',cpuSpeed:1.33, cpuKickMul:0.65,shoot:0.50,approach:0.38,ballDark:false},
  {name:'EEL CAVERN',     theme:'eel',       bg1:'#1a1538',bg2:'#040210',cpuSpeed:1.46, cpuKickMul:0.70,shoot:0.55,approach:0.42,ballDark:false},
];
let currentLevel=0;
// Small wrapper so game events fail silently if gtag isn't ready (e.g. ad blockers)
function track(name,params){try{if(typeof gtag==='function')gtag('event',name,params||{});}catch(e){}}
// Persistent high score = highest level number ever reached on this device/browser
let highLevel=parseInt(localStorage.getItem('aquaKickHighLevel')||'1',10);
let newBest=false;
function updateHighScore(){
  const reached=currentLevel+1;
  if(reached>highLevel){
    highLevel=reached;newBest=true;
    try{localStorage.setItem('aquaKickHighLevel',highLevel);}catch(e){}
    track('new_high_score',{level:highLevel});
  }
}
// Dev/test override: append #level=N (1-indexed) to the URL to start on that level.
// Example: ...underwater_football_mobile.html#level=7  → starts on EEL CAVERN
{const m=location.hash.match(/level=(\d+)/);if(m){const n=parseInt(m[1])-1;if(n>=0&&n<LEVELS.length)currentLevel=n;}}
function lvl(){return LEVELS[currentLevel];}
let state='menu',p1s=0,p2s=0,gtimer=0,gteam=0,tick=0;
let stuckTimer=0,cpuStuckTimer=0,resetMsg=0,kickCooldown=0,kickFlash=0,cpuKickCooldown=0,cpuKickFlash=0,bounceCooldown=0,fishSoundCooldown=0,levelIntroTimer=180;
let muted=false,audioReady=false,AC;
// ═══════════════════════════════════════════════════════════════════════
// AD INTEGRATION — interstitial between matches
// ═══════════════════════════════════════════════════════════════════════
// showAd(onFinish) is called after every match (win or lose) before restart.
// Currently it shows a 5-second PLACEHOLDER screen. To plug in a real ad
// network, replace the body of showAd() with the SDK's request call and
// make sure to call onFinish() in BOTH success and error/closed paths.
//
// CrazyGames SDK:
//   window.CrazyGames.SDK.ad.requestAd("midgame",{adFinished:onFinish,adError:onFinish});
//
// Poki SDK:
//   PokiSDK.commercialBreak().then(onFinish).catch(onFinish);
//
// AdMob (Capacitor, for wrapped native apps):
//   AdMob.showInterstitial().then(onFinish).catch(onFinish);
//
// Google AdSense H5 Games:
//   adBreak({type:'next',adBreakDone:onFinish});
// ═══════════════════════════════════════════════════════════════════════
const AD_DURATION=300;          // 5s @ 60fps for placeholder
const AD_SKIP_AFTER=180;        // allow tap-to-skip after 3s
let adTimer=0,adOnFinish=null;
// Adsterra Popunder — loads once per session, only when a match actually ends
// (win or lose), right as the ad-break placeholder starts. The popunder
// script itself listens for the next click/tap and opens its window then.
let popunderLoaded=false;
function loadPopunder(){
  if(popunderLoaded)return;
  popunderLoaded=true;
  const s=document.createElement('script');
  s.src='https://pl30205009.effectivecpmnetwork.com/1a/45/70/1a457043edfc4488dea31278a3573afa.js';
  document.body.appendChild(s);
}
// Adsterra 300x250 Banner — rendered inside an iframe (via srcdoc) so the ad
// network's document.write call can't wipe out our actual game page. A fresh
// ad is requested every time a match ends.
const adBannerContainer=document.getElementById('adBannerContainer');
function loadBannerAd(){
  adBannerContainer.innerHTML='';
  const iframe=document.createElement('iframe');
  iframe.scrolling='no';
  iframe.srcdoc=`<!DOCTYPE html><html><body style="margin:0;padding:0;overflow:hidden;background:#0a1420;">
<script>
atOptions = {
  'key' : 'f66fe338a38f9f4c902b11bb6ac052e3',
  'format' : 'iframe',
  'height' : 250,
  'width' : 300,
  'params' : {}
};
<\/script>
<script src="https://www.highperformanceformat.com/f66fe338a38f9f4c902b11bb6ac052e3/invoke.js"><\/script>
</body></html>`;
  adBannerContainer.appendChild(iframe);
  adBannerContainer.style.display='block';
}
function hideBannerAd(){adBannerContainer.style.display='none';adBannerContainer.innerHTML='';}
function showAd(onFinish){state='adbreak';adTimer=AD_DURATION;adOnFinish=onFinish;loadPopunder();loadBannerAd();track('ad_break_shown',{level:currentLevel+1});}
function finishAd(){hideBannerAd();const cb=adOnFinish;adOnFinish=null;state='gameover';if(cb)cb();}
function tapContinue(){
  if(state==='gameover')showAd(restart);
  else if(state==='adbreak'&&adTimer<AD_DURATION-AD_SKIP_AFTER)finishAd();
}
let joystick={dx:0,dy:0};
let jTouchId=null;
const jRing=document.getElementById('jRing'),jDot=document.getElementById('jDot');
const kickBtn=document.getElementById('kickBtn'),kickFill=document.getElementById('kickFill');

// Aspect range: ASPECT_MIN preserves original ~5:3 in portrait; ASPECT_MAX widens for landscape phones
const ASPECT_MIN=1.67,ASPECT_MAX=2.4;
function resize(){
  const vv=window.visualViewport;
  const vw=vv?vv.width:window.innerWidth;
  const vh=vv?vv.height:window.innerHeight;
  const aspect=Math.max(ASPECT_MIN,Math.min(ASPECT_MAX,vw/vh));
  W=Math.round(H*aspect);
  C.width=W;C.height=H;
  let w=vw,h=w*H/W;
  if(h>vh){h=vh;w=h*W/H;}
  C.style.width=Math.floor(w)+'px';C.style.height=Math.floor(h)+'px';
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,100));
if(window.visualViewport)window.visualViewport.addEventListener('resize',resize);
resize();

// ── AUTO FULLSCREEN ON MOBILE ────────────────────────────────
// On touch devices, each user touch tries fullscreen until it succeeds.
// Fullscreen API requires a user gesture, so this can't be done on page load.
(function(){
  const isTouchDevice=window.matchMedia&&window.matchMedia('(pointer: coarse)').matches;
  if(!isTouchDevice)return;
  let attempts=0;
  function tryFullscreen(){
    if(attempts>=5)return;
    if(document.fullscreenElement||document.webkitFullscreenElement)return; // already FS
    attempts++;
    const el=document.documentElement;
    const req=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen;
    if(req){
      const p=req.call(el);
      if(p&&p.then)p.then(()=>{
        if(screen.orientation&&screen.orientation.lock){
          screen.orientation.lock('landscape').catch(()=>{});
        }
        setTimeout(resize,300);
      }).catch(()=>{});
    }
    // Fallback: scroll trick to hide iOS Safari address bar
    setTimeout(()=>{if(!document.fullscreenElement&&!document.webkitFullscreenElement)window.scrollTo(0,1);},200);
    setTimeout(resize,400);
  }
  document.addEventListener('touchstart',tryFullscreen,{capture:true});
  // Also try on page load (will be a no-op without gesture, but no harm)
  window.addEventListener('load',()=>setTimeout(()=>window.scrollTo(0,1),300));
})();

// ── AUDIO ────────────────────────────────────────────────────
function initAudio(){if(audioReady)return;try{AC=new(window.AudioContext||window.webkitAudioContext)();audioReady=true;}catch(e){}}
function resumeAC(){if(AC&&AC.state==='suspended')AC.resume();}
function note(freq,t,dur,vol=.25,type='sine',ef=null){
  if(muted||!audioReady)return;resumeAC();
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);o.type=type;o.frequency.value=freq;
  if(ef)o.frequency.exponentialRampToValueAtTime(ef,AC.currentTime+t+dur);
  g.gain.setValueAtTime(.001,AC.currentTime+t);g.gain.linearRampToValueAtTime(vol,AC.currentTime+t+.01);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+t+dur);
  o.start(AC.currentTime+t);o.stop(AC.currentTime+t+dur+.02);
}
function nz(t,dur,vol,fl,fh){
  if(muted||!audioReady)return;resumeAC();
  const buf=AC.createBuffer(1,Math.ceil(AC.sampleRate*dur),AC.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
  const src=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();
  f.type='bandpass';f.frequency.value=(fl+fh)/2;src.buffer=buf;src.connect(f);f.connect(g);g.connect(AC.destination);
  g.gain.setValueAtTime(vol,AC.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+t+dur);
  src.start(AC.currentTime+t);src.stop(AC.currentTime+t+dur+.02);
}
const sndKick=()=>{note(140,0,.13,.45,'sine',45);nz(0,.07,.3,200,600);note(900,0,.04,.08,'square');};
const sndBounce=()=>{note(220,0,.09,.2,'sine',70);nz(0,.05,.12,100,400);};
const sndGoal=()=>{[[523,0],[659,.11],[784,.22],[1047,.33],[1319,.46],[1047,.58]].forEach(([f,t])=>note(f,t,.2,.3,'square'));note(523,0,.6,.08,'sine');};
const sndWhistle=()=>{note(1400,0,.1,.35,'sine');note(1700,.13,.08,.28,'sine');note(1500,.24,.15,.2,'sine');};
const sndFish=()=>{note(320,0,.09,.12,'sine',100);nz(0,.06,.08,150,500);};
const sndVictory=()=>{[[523,0],[659,.1],[784,.2],[1047,.3],[1319,.42],[1047,.55],[1319,.65]].forEach(([f,t])=>note(f,t,.25,.28,'square'));};
const sndDefeat=()=>{[[440,0],[392,.16],[330,.33],[262,.52]].forEach(([f,t])=>note(f,t,.3,.22,'sine'));};
const sndBubble=()=>{const f=500+Math.random()*600;note(f,0,.04,.03,'sine',f*1.6);};
const sndMiss=()=>{nz(0,.05,.08,300,800);};
const sndShock=()=>{nz(0,.18,.4,300,2000);note(880,0,.08,.25,'square');note(440,.08,.12,.25,'square');note(220,.2,.15,.2,'sawtooth');};

document.getElementById('muteBtn').addEventListener('click',()=>{muted=!muted;document.getElementById('muteBtn').textContent=muted?'🔇 MUTED':'🔊 SOUND';});

// ── JOYSTICK TOUCH (overlay on canvas, bottom-left) ───────────
const jMaxR=30;
function getJCenter(){const r=jRing.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}
function updateJoystick(tx,ty){
  const c=getJCenter();let dx=tx-c.x,dy=ty-c.y;
  const d=Math.sqrt(dx*dx+dy*dy);
  if(d>jMaxR){dx=dx/d*jMaxR;dy=dy/d*jMaxR;}
  joystick.dx=dx/jMaxR;joystick.dy=dy/jMaxR;
  jDot.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
}
function resetJoystick(){joystick.dx=0;joystick.dy=0;jDot.style.transform='translate(-50%,-50%)';jTouchId=null;}

jRing.addEventListener('touchstart',e=>{e.preventDefault();initAudio();if(jTouchId===null){const t=e.changedTouches[0];jTouchId=t.identifier;updateJoystick(t.clientX,t.clientY);}},{passive:false});
document.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches){if(t.identifier===jTouchId){e.preventDefault();updateJoystick(t.clientX,t.clientY);}}
},{passive:false});
document.addEventListener('touchend',e=>{for(const t of e.changedTouches){if(t.identifier===jTouchId)resetJoystick();}});
document.addEventListener('touchcancel',e=>{for(const t of e.changedTouches){if(t.identifier===jTouchId)resetJoystick();}});

// Canvas tap: triggers ad break on match end; skips ad once allowed
C.addEventListener('touchstart',e=>{if(state==='gameover'||state==='adbreak'){e.preventDefault();initAudio();tapContinue();}},{passive:false});

// ── KICK BUTTON TOUCH ────────────────────────────────────────
kickBtn.addEventListener('touchstart',e=>{e.preventDefault();initAudio();if(state==='gameover'||state==='adbreak'){tapContinue();return;}kickBtn.classList.add('pressed');tryKick();},{passive:false});
kickBtn.addEventListener('touchend',()=>kickBtn.classList.remove('pressed'));

// ── KEYBOARD ─────────────────────────────────────────────────
const keys={};
function onKey(e,v){
  initAudio();keys[e.key]=v;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key))e.preventDefault();
  if(e.key===' '&&v){if(state==='gameover'||state==='adbreak'){tapContinue();return;}if(state==='playing')tryKick();}
}
document.addEventListener('keydown',e=>onKey(e,1));document.addEventListener('keyup',e=>onKey(e,0));
C.addEventListener('click',()=>{initAudio();if(state==='gameover'||state==='adbreak')tapContinue();});
kickBtn.addEventListener('click',()=>{if(state==='gameover'||state==='adbreak')tapContinue();});

// ── GAME STATE ────────────────────────────────────────────────
let p1,p2,ball;

function resetAll(){p1={x:155,y:H/2,vx:0,vy:0,r:22,frozen:0};p2={x:W-155,y:H/2,vx:0,vy:0,r:22,frozen:0};resetBall();}
resetAll();

const bubs=Array.from({length:45},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2.5+.5,spd:Math.random()*.45+.15,drift:(Math.random()-.5)*.15,a:Math.random()*.3+.1,popT:Math.floor(Math.random()*300)}));

let corals=[];
let fish=[];
const CREATURE_CFG={small:{sz:16,vmul:1.0,xPad:80},turtle:{sz:22,vmul:0.7,xPad:110},manta:{sz:34,vmul:0.6,xPad:140},stingray:{sz:30,vmul:0.5,xPad:160},eel:{sz:24,vmul:0.45,xPad:160}};
function addFish(type){
  type=type||'small';

function mpConnect(onLobbyJoined, enforceCap){
  const LBC = Photon.LoadBalancing.LoadBalancingClient;
  photonClient = new LBC(Photon.ConnectionProtocol.Wss, APP_ID, "1.0");
  photonClient.onStateChange = function(state){
    if(state === LBC.State.Disconnected) mpSetStatus('Disconnected.');
  };
  photonClient.onRoomList = function(rooms){
    if(enforceCap && rooms.length>=MAX_ROOMS){
      mpSetStatus('⚠️ Servers are busy right now (max games reached). Please try again in a minute.');
      photonClient.disconnect();
      return;
    }
    onLobbyJoined();
  };
  photonClient.onError = function(code,msg){mpSetStatus('Connection error — try again.');console.error('Photon error',code,msg);};
  photonClient.onEvent = function(code,content,actorNr){
    if(code===EV_STATE){
      // We're the guest: host is authoritative, just mirror whatever it sends.
      p1.x=content.p1x;p1.y=content.p1y;p1.vx=content.p1vx;p1.vy=content.p1vy;
      p2.x=content.p2x;p2.y=content.p2y;p2.vx=content.p2vx;p2.vy=content.p2vy;
      ball.x=content.bx;ball.y=content.by;
      p1s=content.p1s;p2s=content.p2s;state=content.state;gteam=content.gteam;currentLevel=content.currentLevel;
      kickFlash=content.kf;cpuKickFlash=content.ckf;
    } else if(code===EV_INPUT){
      // We're the host: apply the guest's latest input to p2.
      remoteInput.ax=content.ax;remoteInput.ay=content.ay;
      if(content.kick)remoteInput.kick=true;
    }
  };
  function mpUpdateRole(){
    const myActorNr = photonClient.myActor().actorNr;
    const masterNr = photonClient.myRoomMasterActorNr();
    mpRole = (myActorNr === masterNr) ? 'host' : 'guest';
  }
  photonClient.onJoinRoom = function(createdByMe){
    mpUpdateRole();
    const opponentCount = Object.keys(photonClient.myRoomActors()).length;
    if(opponentCount>=2){
      mpSetStatus('✅ Opponent connected! You are '+(mpRole==='host'?'HOST':'GUEST')+'.');
      track('mp_matched',{role:mpRole});
      mpStartMatchIfReady();
    } else {
      mpSetStatus(mpRole==='host'?'Room created. Waiting for opponent...':'Joined room. Waiting...');
    }
  };
  photonClient.onActorJoin = function(actor){
    mpUpdateRole();
    if(!actor.isLocal){
      mpSetStatus('✅ Opponent connected! You are '+(mpRole==='host'?'HOST':'GUEST')+'.');
      track('mp_matched',{role:mpRole});
      mpStartMatchIfReady();
    }
  };
  photonClient.onActorLeave = function(actor){
    mpUpdateRole();
    if(!actor.isLocal){
      mpSetStatus('⚠️ Opponent disconnected.');
      mpActive=false;
    }
  };
  mpSetStatus('Connecting...');
  photonClient.connectToRegionMaster('EU');
}

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

function tryKick(){
  if(mpActive&&mpRole==='guest'){pendingKick=true;return;}
  if(p1.frozen>0){sndMiss();return;}
  if(kickCooldown>0){sndMiss();return;}
  const dx=ball.x-p1.x,dy=ball.y-p1.y,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>KICK_RANGE){sndMiss();return;}
  kickCooldown=28;kickFlash=18;
  const spd=Math.sqrt(p1.vx*p1.vx+p1.vy*p1.vy);
  let kx,ky;
  if(spd>0.5){kx=p1.vx/spd;ky=p1.vy/spd;}else{kx=dx/dist;ky=dy/dist;}
  ball.vx=kx*KICK_FORCE;ball.vy=ky*KICK_FORCE;
  p1.vx-=kx*2;p1.vy-=ky*2;sndKick();
}

function shouldCpuKick(){
  // Defense: always clear the ball if it's in range — angle doesn't matter, get it away from goal
  if(cpuMode==='defense')return true;
  // Vector from ball to its target goal (left side)
  const bgx=-ball.x,bgy=H/2-ball.y,bgd=Math.sqrt(bgx*bgx+bgy*bgy)||1;
  // Vector from ball to CPU
  const bcx=p2.x-ball.x,bcy=p2.y-ball.y,bcd=Math.sqrt(bcx*bcx+bcy*bcy)||1;
  // Normalized dot product: -1 = CPU directly behind ball facing goal, +1 = CPU between ball and goal
  const align=(bgx*bcx+bgy*bcy)/(bgd*bcd);
  if(align>-0.2)return false; // bad shooting angle — dribble (push) instead
  // Is the player blocking the shot line?
  const bgnx=bgx/bgd,bgny=bgy/bgd;
  const pdx=p1.x-ball.x,pdy=p1.y-ball.y;
  const projOnLine=pdx*bgnx+pdy*bgny;         // distance along ball→goal axis
  const perpFromLine=Math.abs(-pdx*bgny+pdy*bgnx); // distance perpendicular
  if(projOnLine>0&&projOnLine<bgd&&perpFromLine<40)return false; // player in the way
  return true;
}

function tryNetKick(){
  if(p2.frozen>0)return;
  if(cpuKickCooldown>0)return;
  const dx=ball.x-p2.x,dy=ball.y-p2.y,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>KICK_RANGE)return;
  cpuKickCooldown=28;cpuKickFlash=18;
  const spd=Math.sqrt(p2.vx*p2.vx+p2.vy*p2.vy);
  let kx,ky;
  if(spd>0.5){kx=p2.vx/spd;ky=p2.vy/spd;}else{kx=dx/dist;ky=dy/dist;}
  ball.vx=kx*KICK_FORCE;ball.vy=ky*KICK_FORCE;
  p2.vx-=kx*2;p2.vy-=ky*2;sndKick();
}

function tryCpuKick(){
  if(p2.frozen>0)return;
  if(cpuKickCooldown>0)return;
  const dx=ball.x-p2.x,dy=ball.y-p2.y,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>CPU_KICK_RANGE)return;
  if(!shouldCpuKick())return;
  // Aim toward center of player's goal (left side)
  const tx=0-ball.x,ty=H/2-ball.y,td=Math.sqrt(tx*tx+ty*ty)||1;
  let kx=tx/td,ky=ty/td;
  // Apply ±10° random inaccuracy
  const ang=(Math.random()-0.5)*0.35,cs=Math.cos(ang),sn=Math.sin(ang);
  const nkx=kx*cs-ky*sn,nky=kx*sn+ky*cs;
  cpuKickCooldown=45;cpuKickFlash=18;
  ball.vx=nkx*KICK_FORCE*lvl().cpuKickMul;ball.vy=nky*KICK_FORCE*lvl().cpuKickMul;
  p2.vx-=nkx*2;p2.vy-=nky*2;
  sndKick();
}

function circResolve(a,b,bounce){
  const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||.01,mn=a.r+b.r;
  if(d>=mn)return;
  const nx=dx/d,ny=dy/d,rv=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
  if(rv<0){const imp=rv*(bounce||1.5);b.vx-=nx*imp*.7;b.vy-=ny*imp*.7;a.vx+=nx*imp*.3;a.vy+=ny*imp*.3;}
  const ov=mn-d;b.x+=nx*ov*.6;b.y+=ny*ov*.6;a.x-=nx*ov*.4;a.y-=ny*ov*.4;
}
let cpuMode='attack';
function updateAI(){
  const ownGoalX=W-GW,ownGoalY=H/2;
  // ── Threat detection: ball heading toward own goal, OR ball past CPU still moving in that direction
  const ballThreat=(ball.x>W/2&&ball.vx>999)||(ball.x>p2.x+10&&ball.vx>999); // disabled
  cpuMode=ballThreat?'defense':'attack';

  let tx,ty,spd;
  if(cpuMode==='defense'){
    // Stand between ball and own goal, ~90px in front of goal mouth (closer if ball is very near)
    const ddx=ball.x-ownGoalX,ddy=ball.y-ownGoalY;
    const dd=Math.sqrt(ddx*ddx+ddy*ddy)||1;
    const standoff=Math.min(90,dd*0.5);
    tx=ownGoalX+ddx/dd*standoff;
    ty=ownGoalY+ddy/dd*standoff;
    spd=.4; // hustle back
  } else {
    // Offensive logic (unchanged): get behind the ball relative to attacking goal, then shoot
    const gx=GW,gy=GY+GH/2,btgX=gx-ball.x,btgY=gy-ball.y,btgD=Math.sqrt(btgX*btgX+btgY*btgY)||1;
    const bnx=btgX/btgD,bny=btgY/btgD,behX=ball.x-bnx*70,behY=ball.y-bny*70;
    const toPoDist=Math.sqrt((behX-p2.x)**2+(behY-p2.y)**2)||1;
    if(toPoDist<35){tx=ball.x+bnx*300;ty=ball.y+bny*300;spd=lvl().shoot;}else{tx=behX;ty=behY;spd=lvl().approach;}
  }
  const dx=tx-p2.x,dy=ty-p2.y,d=Math.sqrt(dx*dx+dy*dy)||1;
  p2.vx=clamp((p2.vx+dx/d*spd)*DRAG,-lvl().cpuSpeed,lvl().cpuSpeed);p2.vy=clamp((p2.vy+dy/d*spd)*DRAG,-lvl().cpuSpeed,lvl().cpuSpeed);
  p2.x=clamp(p2.x+p2.vx,GW+p2.r,W-GW-p2.r);p2.y=clamp(p2.y+p2.vy,p2.r,H-p2.r);
  tryCpuKick();
}

let goalSfxPlayed=false,overSfxPlayed=false;

function mpBroadcastIfHost(){
  if(mpActive&&mpRole==='host'&&photonClient&&tick%2===0){
    photonClient.raiseEvent(EV_STATE,{
      p1x:p1.x,p1y:p1.y,p1vx:p1.vx,p1vy:p1.vy,
      p2x:p2.x,p2y:p2.y,p2vx:p2.vx,p2vy:p2.vy,
      bx:ball.x,by:ball.y,
      p1s,p2s,state,gteam,currentLevel,
      kf:kickFlash,ckf:cpuKickFlash
    });
  }
}

function update(){
  tick++;
  mpBroadcastIfHost();
  // Ad break: countdown only, freeze all gameplay
  if(state==='adbreak'){adTimer--;if(adTimer<=0)finishAd();return;}
  if(resetMsg>0)resetMsg--;if(kickCooldown>0)kickCooldown--;if(kickFlash>0)kickFlash--;
  if(cpuKickCooldown>0)cpuKickCooldown--;if(cpuKickFlash>0)cpuKickFlash--;
  if(bounceCooldown>0)bounceCooldown--;if(fishSoundCooldown>0)fishSoundCooldown--;
  if(levelIntroTimer>0)levelIntroTimer--;
  kickFill.style.width=(kickCooldown===0?100:Math.round((1-kickCooldown/28)*100))+'%';

  for(const b of bubs){b.y-=b.spd;b.x+=b.drift;if(b.y<-5){b.y=H+5;b.x=Math.random()*W;b.popT=tick+100+Math.floor(Math.random()*400);}if(b.popT===tick)sndBubble();}
  for(const f of fish){f.x+=f.vx;f.ph+=.07;f.y=f.baseY+Math.sin(f.ph)*18;}
  fish=fish.filter(f=>f.x>-220&&f.x<W+220);
  if(fish.length<2){
    const t=lvl().theme;
    const primary=t==='turtles'?'turtle':t==='mantas'?'manta':t==='stingrays'?'stingray':t==='eel'?'eel':'small';
    addFish(primary);
  }

  if(state==='goal'){if(!goalSfxPlayed){sndGoal();goalSfxPlayed=true;}gtimer--;if(gtimer<=0){state=(p1s>=WIN||p2s>=WIN)?'gameover':'playing';goalSfxPlayed=false;if(state==='gameover'){track(p1s>=WIN?'match_won':'match_lost',{level:currentLevel+1,level_name:lvl().name,player_score:p1s,cpu_score:p2s});if(p1s>=WIN)updateHighScore();}if(state==='playing'){resetAll();sndWhistle();}}return;}
  if(state==='gameover'){if(!overSfxPlayed){overSfxPlayed=true;p1s>=WIN?sndVictory():sndDefeat();}return;}
  if(state==='menu')return;

  // Movement from keyboard OR joystick
  let ax=0,ay=0;
  if(keys['ArrowLeft']||keys['a']||keys['A'])ax=-1;
  if(keys['ArrowRight']||keys['d']||keys['D'])ax=1;
  if(keys['ArrowUp']||keys['w']||keys['W'])ay=-1;
  if(keys['ArrowDown']||keys['s']||keys['S'])ay=1;
  if(p1.frozen>0){p1.frozen--;ax=0;ay=0;p1.vx*=0.7;p1.vy*=0.7;}
  ax=clamp(ax+joystick.dx,-1,1);ay=clamp(ay+joystick.dy,-1,1);
  if(p1.frozen>0){ax=0;ay=0;}

  if(mpActive&&mpRole==='guest'){
    // We just send our input; the host runs the real physics and broadcasts
    // the result back to us (applied in the onEvent handler above).
    if(photonClient&&tick%2===0){
      photonClient.raiseEvent(EV_INPUT,{ax,ay,kick:pendingKick});
      pendingKick=false;
    }
    return;
  }

  p1.vx=clamp((p1.vx+ax*.9)*DRAG,-MSPD,MSPD);p1.vy=clamp((p1.vy+ay*.9)*DRAG,-MSPD,MSPD);
  p1.x=clamp(p1.x+p1.vx,GW+p1.r,W-GW-p1.r);p1.y=clamp(p1.y+p1.vy,p1.r,H-p1.r);
  // CPU freeze tick + AI gate (skip AI logic while frozen)
  if(p2.frozen>0){p2.frozen--;p2.vx*=0.7;p2.vy*=0.7;}
  else if(mpActive&&mpRole==='host'){
    // Guest-controlled paddle: apply their latest received input, same formula as p1's own movement.
    const rax=clamp(remoteInput.ax,-1,1),ray=clamp(remoteInput.ay,-1,1);
    p2.vx=clamp((p2.vx+rax*.9)*DRAG,-MSPD,MSPD);p2.vy=clamp((p2.vy+ray*.9)*DRAG,-MSPD,MSPD);
    p2.x=clamp(p2.x+p2.vx,GW+p2.r,W-GW-p2.r);p2.y=clamp(p2.y+p2.vy,p2.r,H-p2.r);
    if(remoteInput.kick){remoteInput.kick=false;tryNetKick();}
  }
  else updateAI();
  // Eel shock check — same line-segment hit test applied to both players
  for(const f of fish){
    if(f.type!=='eel')continue;
    // Body line: head (f.x,f.y) → tail offset by 2.4*sz in the direction opposite to motion
    const tailOffset=f.vx>=0?2.4*f.sz:-2.4*f.sz;
    const hx=f.x,hy=f.y,tx=f.x-tailOffset,ty=f.y;
    const dx=tx-hx,dy=ty-hy,l2=dx*dx+dy*dy;
    const hitRadius=f.sz*0.45;
    // Check both players
    for(const pl of [p1,p2]){
      if(pl.frozen>0)continue;
      const tt=l2>0?Math.max(0,Math.min(1,((pl.x-hx)*dx+(pl.y-hy)*dy)/l2)):0;
      const cx=hx+tt*dx,cy=hy+tt*dy;
      if(Math.hypot(pl.x-cx,pl.y-cy)<hitRadius+pl.r){pl.frozen=120;sndShock();}
    }
  }

  ball.vx*=.93;ball.vy*=.93;ball.x+=ball.vx;ball.y+=ball.vy;
  if(ball.y<ball.r){ball.y=ball.r;ball.vy*=-.65;if(!bounceCooldown){sndBounce();bounceCooldown=12;}}
  if(ball.y>H-ball.r){ball.y=H-ball.r;ball.vy*=-.65;if(!bounceCooldown){sndBounce();bounceCooldown=12;}}
  if(ball.x<ball.r){if(ball.y>GY&&ball.y<GY+GH){p2s++;gteam=2;state='goal';gtimer=150;goalSfxPlayed=false;}else{ball.x=ball.r;ball.vx*=-.65;if(!bounceCooldown){sndBounce();bounceCooldown=12;}}}
  if(ball.x>W-ball.r){if(ball.y>GY&&ball.y<GY+GH){p1s++;gteam=1;state='goal';gtimer=150;goalSfxPlayed=false;}else{ball.x=W-ball.r;ball.vx*=-.65;if(!bounceCooldown){sndBounce();bounceCooldown=12;}}}

  circResolve(p1,ball,1.6);circResolve(p2,ball,0.4);
  // Player-vs-player collision: position separation + momentum exchange (bounce factor 0.4)
  const pdx=p2.x-p1.x,pdy=p2.y-p1.y,pd=Math.sqrt(pdx*pdx+pdy*pdy)||.01,pmn=p1.r+p2.r;
  if(pd<pmn){
    const nx=pdx/pd,ny=pdy/pd,ov=(pmn-pd)/2;
    p1.x-=nx*ov;p1.y-=ny*ov;p2.x+=nx*ov;p2.y+=ny*ov;
    const rv=(p2.vx-p1.vx)*nx+(p2.vy-p1.vy)*ny;
    if(rv<0){const j=rv*0.7;p1.vx+=nx*j;p1.vy+=ny*j;p2.vx-=nx*j;p2.vy-=ny*j;
      if(!bounceCooldown){sndBounce();bounceCooldown=12;}}
  }

  for(const f of fish){
    const fR=f.sz*.75;
    const dx=ball.x-f.x,dy=ball.y-f.y,d=Math.sqrt(dx*dx+dy*dy)||.01;
    if(d<ball.r+fR){const nx=dx/d,ny=dy/d,ov=ball.r+fR-d;ball.x+=nx*ov*.8;ball.y+=ny*ov*.8;const dot=ball.vx*nx+ball.vy*ny;if(dot<0){ball.vx-=dot*nx*1.4;ball.vy-=dot*ny*1.4;}f.vx+=nx*1.5;if(!fishSoundCooldown){sndFish();fishSoundCooldown=20;}}
    const d1=Math.sqrt((p1.x-f.x)**2+(p1.y-f.y)**2)||.01;if(d1<p1.r+fR){const nx=(p1.x-f.x)/d1,ny=(p1.y-f.y)/d1,ov=p1.r+fR-d1;p1.x+=nx*ov*.5;p1.y+=ny*ov*.5;f.vx-=nx*1.5;if(!fishSoundCooldown){sndFish();fishSoundCooldown=20;}}
    const d2=Math.sqrt((p2.x-f.x)**2+(p2.y-f.y)**2)||.01;if(d2<p2.r+fR){const nx=(p2.x-f.x)/d2,ny=(p2.y-f.y)/d2,ov=p2.r+fR-d2;p2.x+=nx*ov*.5;p2.y+=ny*ov*.5;f.vx-=nx*1.5;}
  }

  // Stuck only counts when the ball is TOUCHING the walls in a corner (two perpendicular walls at once)
  // for more than 1 second. "Touching" = ball edge within 8px of the wall surface.
  const TB=8; // tolerance beyond ball radius
  const touchingV=ball.x<=ball.r+TB||ball.x>=W-ball.r-TB;
  const touchingH=ball.y<=ball.r+TB||ball.y>=H-ball.r-TB;
  const ballInCorner=touchingV&&touchingH;
  if(ballInCorner)stuckTimer++;else stuckTimer=0;
  if(stuckTimer>60){resetBall();resetMsg=80;sndWhistle();}

  // CPU corner-stuck detection: in a corner zone with near-zero velocity for >1s → full reset
  const CZ=70;
  const nearLeft=p2.x<GW+p2.r+CZ,nearRight=p2.x>W-GW-p2.r-CZ;
  const nearTop=p2.y<p2.r+CZ,nearBot=p2.y>H-p2.r-CZ;
  const inCorner=(nearLeft||nearRight)&&(nearTop||nearBot);
  const cpuSpd=Math.sqrt(p2.vx*p2.vx+p2.vy*p2.vy);
  if(inCorner&&cpuSpd<0.5)cpuStuckTimer++;else cpuStuckTimer=0;
  if(cpuStuckTimer>60){resetAll();resetMsg=80;sndWhistle();cpuStuckTimer=0;}
}

function drawAdBreak(){

  if(adTimer<AD_DURATION-AD_SKIP_AFTER){

function drawSmallFish(f){
  ctx.fillStyle=`hsl(${f.hue},70%,58%)`;ctx.shadowColor=`hsl(${f.hue},80%,65%)`;ctx.shadowBlur=10;
  ctx.beginPath();ctx.ellipse(0,0,f.sz,f.sz*.5,0,0,Math.PI*2);ctx.fill();
  const tw=Math.sin(f.ph*2)*8;
  ctx.beginPath();ctx.moveTo(-f.sz+2,0);ctx.lineTo(-f.sz-f.sz*.65,-f.sz*.45+tw);ctx.lineTo(-f.sz-f.sz*.65,f.sz*.45+tw);ctx.closePath();ctx.fill();
  ctx.fillStyle=`hsl(${f.hue},70%,42%)`;ctx.shadowBlur=0;
  ctx.beginPath();ctx.ellipse(f.sz*.05,-f.sz*.35,f.sz*.3,f.sz*.2,-0.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0a0a14';
  ctx.beginPath();ctx.arc(f.sz*.58,-f.sz*.08,f.sz*.12,0,Math.PI*2);ctx.fill();
}
function drawEel(f){
  const s=f.sz,wave=f.ph;
  // Pulsing electric glow
  const pulse=0.5+0.5*Math.sin(wave*3);
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.shadowColor='rgba(255,230,80,'+(0.45+pulse*0.35)+')';ctx.shadowBlur=14+pulse*8;
  // Body as a thick stroked wavy line
  ctx.strokeStyle='#ffd728';ctx.lineWidth=s*0.36;
  ctx.beginPath();
  const segs=10,len=s*2.4;
  for(let i=0;i<=segs;i++){
    const t=i/segs;
    const x=-len*(1-t);
    const y=Math.sin(wave+i*0.7)*s*0.28;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.stroke();
  // Body inner shading (lighter top)
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(255,255,180,0.4)';ctx.lineWidth=s*0.12;
  ctx.beginPath();
  for(let i=0;i<=segs;i++){
    const t=i/segs;
    const x=-len*(1-t);
    const y=Math.sin(wave+i*0.7)*s*0.28-s*0.06;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.stroke();
  // Head
  const headY=Math.sin(wave+segs*0.7)*s*0.28;
  ctx.shadowColor='rgba(255,200,40,0.7)';ctx.shadowBlur=10;
  ctx.fillStyle='#ffc010';
  ctx.beginPath();ctx.arc(0,headY,s*0.24,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // Eye
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(s*0.05,headY-s*0.07,s*0.08,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0a0a14';
  ctx.beginPath();ctx.arc(s*0.07,headY-s*0.07,s*0.045,0,Math.PI*2);ctx.fill();
  // Mouth (thin line)
  ctx.strokeStyle='#000';ctx.lineWidth=s*0.04;
  ctx.beginPath();ctx.moveTo(s*0.18,headY+s*0.04);ctx.lineTo(s*0.24,headY+s*0.08);ctx.stroke();
  // Electric sparks (intermittent based on wave)
  if(pulse>0.6){
    ctx.strokeStyle='rgba(255,255,255,'+(pulse-0.3)+')';ctx.lineWidth=1.5;
    ctx.shadowColor='rgba(120,160,255,0.9)';ctx.shadowBlur=8;
    const spx=-len*(0.3+0.4*Math.sin(wave*2));
    const spy=Math.sin(wave+segs*0.4)*s*0.28;
    ctx.beginPath();
    ctx.moveTo(spx,spy-s*0.2);
    ctx.lineTo(spx+s*0.1,spy-s*0.32);
    ctx.lineTo(spx-s*0.05,spy-s*0.42);
    ctx.lineTo(spx+s*0.08,spy-s*0.58);
    ctx.stroke();
  }
}
function drawTurtle(f){
  const s=f.sz,flap=Math.sin(f.ph*1.3)*0.22;
  // Flippers (simple ellipses, behind body)
  ctx.fillStyle='#5ca035';ctx.shadowColor='rgba(40,80,30,0.45)';ctx.shadowBlur=7;
  ctx.beginPath();ctx.ellipse(s*0.45,-s*0.55,s*0.28,s*0.12,-0.5+flap,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(s*0.45,s*0.55,s*0.28,s*0.12,0.5-flap,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(-s*0.45,-s*0.5,s*0.22,s*0.1,-0.5-flap,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(-s*0.45,s*0.5,s*0.22,s*0.1,0.5+flap,0,Math.PI*2);ctx.fill();
  // Shell base
  ctx.fillStyle='#3d7825';
  ctx.beginPath();ctx.ellipse(0,0,s,s*0.82,0,0,Math.PI*2);ctx.fill();
  // Shell highlight (single light patch — fish-style simplicity)
  ctx.shadowBlur=0;ctx.fillStyle='#6cb838';
  ctx.beginPath();ctx.ellipse(-s*0.15,-s*0.22,s*0.55,s*0.32,0,0,Math.PI*2);ctx.fill();
  // Head
  ctx.fillStyle='#5ca035';
  ctx.beginPath();ctx.ellipse(s*0.95,0,s*0.24,s*0.18,0,0,Math.PI*2);ctx.fill();
  // Eye dot (same style as fish)
  ctx.fillStyle='#0a0a14';
  ctx.beginPath();ctx.arc(s*1.05,-s*0.05,s*0.055,0,Math.PI*2);ctx.fill();
}
function drawManta(f){
  const s=f.sz,flap=Math.sin(f.ph)*0.22;
  ctx.fillStyle='#3a4555';ctx.shadowColor='rgba(0,5,18,.55)';ctx.shadowBlur=14;
  // Body + wings as a single path (diamond with flapping wing tips)
  ctx.beginPath();
  ctx.moveTo(s*.6,0);
  ctx.lineTo(s*.15,-s*(0.85+flap));
  ctx.lineTo(-s*.55,-s*.42);
  ctx.lineTo(-s*.45,0);
  ctx.lineTo(-s*.55,s*.42);
  ctx.lineTo(s*.15,s*(0.85+flap));
  ctx.closePath();
  ctx.fill();
  // Cephalic horns
  ctx.fillStyle='#2d3645';ctx.shadowBlur=0;
  ctx.beginPath();ctx.moveTo(s*.62,-s*.08);ctx.lineTo(s*.82,-s*.2);ctx.lineTo(s*.7,-s*.03);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(s*.62,s*.08);ctx.lineTo(s*.82,s*.2);ctx.lineTo(s*.7,s*.03);ctx.closePath();ctx.fill();
  // Spots
  ctx.fillStyle='rgba(150,170,200,.18)';
  ctx.beginPath();ctx.arc(s*.0,-s*.3,s*.06,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(-s*.2,s*.25,s*.05,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(s*.15,s*.05,s*.05,0,Math.PI*2);ctx.fill();
}
function drawStingray(f){
  const s=f.sz,flap=Math.sin(f.ph)*0.18,tw=Math.sin(f.ph*1.8)*0.25;
  ctx.fillStyle='#4a3f55';ctx.shadowColor='rgba(10,5,25,.5)';ctx.shadowBlur=10;
  // Rounded diamond body
  ctx.beginPath();
  ctx.moveTo(s*.55,0);
  ctx.quadraticCurveTo(s*.25,-s*(0.7+flap),-s*.3,-s*.45);
  ctx.quadraticCurveTo(-s*.5,0,-s*.3,s*.45);
  ctx.quadraticCurveTo(s*.25,s*(0.7+flap),s*.55,0);
  ctx.fill();
  // Long thin tail
  ctx.strokeStyle='#3a3045';ctx.lineWidth=s*.08;ctx.lineCap='round';ctx.shadowBlur=0;
  ctx.beginPath();ctx.moveTo(-s*.3,0);ctx.quadraticCurveTo(-s*0.9,tw*s,-s*1.5,tw*s*1.6);ctx.stroke();
  // Eyes
  ctx.fillStyle='#0a0a14';
  ctx.beginPath();ctx.arc(s*.18,-s*.18,s*.06,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(s*.18,s*.18,s*.06,0,Math.PI*2);ctx.fill();
}
function drawCoral(c){
  c.sway+=.012;
  ctx.save();
  const baseCol=`hsl(${c.hue},${c.br}%,55%)`;
  const darkCol=`hsl(${c.hue},${c.br}%,40%)`;
  const lightCol=`hsl(${c.hue},${c.br}%,72%)`;
  ctx.shadowColor=darkCol;ctx.shadowBlur=6;ctx.fillStyle=baseCol;
  if(c.type==='fan'){
    // Sea fan: wide, lattice-like, swaying
    const sw=Math.sin(c.sway)*5;
    ctx.translate(c.x+sw*.3,H);
    ctx.rotate(sw*.02);
    ctx.beginPath();
    // Fan body — wide triangle with curved top
    ctx.moveTo(-c.h*.55,0);
    ctx.quadraticCurveTo(-c.h*.4,-c.h*.6,0,-c.h*1.05);
    ctx.quadraticCurveTo(c.h*.4,-c.h*.6,c.h*.55,0);
    ctx.closePath();ctx.fill();
    // Stem
    ctx.fillStyle=darkCol;ctx.fillRect(-3,-10,6,10);
    // Lattice lines
    ctx.shadowBlur=0;ctx.strokeStyle=darkCol;ctx.lineWidth=1.2;
    for(let i=-4;i<=4;i++){const x=i*c.h*.13;ctx.beginPath();ctx.moveTo(x*.3,-5);ctx.lineTo(x,-c.h*.9);ctx.stroke();}
    for(let i=1;i<=3;i++){const y=-c.h*i*.28;ctx.beginPath();ctx.moveTo(-c.h*.45+y*.1,y);ctx.quadraticCurveTo(0,y-3,c.h*.45-y*.1,y);ctx.stroke();}
    // Bright tips
    ctx.fillStyle=lightCol;ctx.shadowBlur=4;ctx.shadowColor=lightCol;
    ctx.beginPath();ctx.arc(0,-c.h*1.0,4,0,Math.PI*2);ctx.fill();
  }
  else if(c.type==='anemone'){
    // Sea anemone: cluster of swaying tentacles
    ctx.translate(c.x,H);
    // Base mound
    ctx.fillStyle=`hsl(${c.hue},${c.br-15}%,45%)`;
    ctx.beginPath();ctx.ellipse(0,-4,14,8,0,0,Math.PI*2);ctx.fill();
    // Tentacles - 12 swaying lines
    ctx.strokeStyle=baseCol;ctx.lineCap='round';ctx.lineWidth=3.5;ctx.shadowColor=baseCol;ctx.shadowBlur=8;
    for(let i=0;i<14;i++){
      const a=(i/13-0.5)*2.4;
      const len=c.h*(.55+Math.random()*.0+(i%3)*.08);
      const sw=Math.sin(c.sway+i*.6)*8;
      ctx.beginPath();
      ctx.moveTo(Math.sin(a)*8,-6);
      ctx.quadraticCurveTo(Math.sin(a)*16+sw*.5,-len*.5,Math.sin(a)*22+sw,-len);
      ctx.stroke();
    }
    // Bright tips on a few tentacles
    ctx.fillStyle=lightCol;ctx.shadowBlur=3;
    for(let i=0;i<6;i++){const a=(i/5-0.5)*2.0,sw=Math.sin(c.sway+i*.6)*8,len=c.h*.55;ctx.beginPath();ctx.arc(Math.sin(a)*22+sw,-len,2.2,0,Math.PI*2);ctx.fill();}
  }
  else{
    // Branching coral tower (default)
    for(let i=0;i<5;i++){const t=(i+1)/5,sw=Math.sin(c.sway+i*.4)*4,yOff=H-c.h*t;ctx.beginPath();ctx.ellipse(c.x+sw,yOff,11+(5-i)*1.8,7+(5-i)*1.2,0,0,Math.PI*2);ctx.fill();}
    const sb=Math.sin(c.sway*.7)*2;
    ctx.beginPath();ctx.ellipse(c.x-12+sb,H-c.h*.55,6,9,-0.35,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(c.x+14+sb,H-c.h*.42,6,10,0.35,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(c.x-9-sb,H-c.h*.78,5,7,0.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(c.x+10+sb*.7,H-c.h*.92,4,6,-0.3,0,Math.PI*2);ctx.fill();
    // Bright tips
    ctx.fillStyle=lightCol;ctx.shadowBlur=4;
    ctx.beginPath();ctx.ellipse(c.x+sb,H-c.h,8,5,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(c.x+14+sb,H-c.h*.42,2.5,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawShock(pl,showZap){
  if(pl.frozen<=0)return;
  ctx.save();ctx.translate(pl.x,pl.y);
  ctx.strokeStyle='rgba(255,255,255,0.95)';ctx.lineWidth=2;ctx.lineCap='round';
  ctx.shadowColor='#88aaff';ctx.shadowBlur=12;
  for(let i=0;i<6;i++){
    const a=i*Math.PI/3+tick*0.18;
    const r1=pl.r+5,r2=pl.r+12+Math.sin(tick*0.4+i)*3;
    const jx=(Math.random()-0.5)*4,jy=(Math.random()-0.5)*4;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*r1,Math.sin(a)*r1);
    ctx.lineTo(Math.cos(a+0.2)*r2+jx,Math.sin(a+0.2)*r2+jy);
    ctx.lineTo(Math.cos(a-0.1)*(r2+5)+jx*1.5,Math.sin(a-0.1)*(r2+5)+jy*1.5);
    ctx.stroke();
  }
  // Pulsing electric ring
  ctx.strokeStyle='rgba(255,230,80,'+(0.5+0.4*Math.sin(tick*0.5))+')';
  ctx.lineWidth=2;ctx.shadowBlur=8;
  ctx.beginPath();ctx.arc(0,0,pl.r+8,0,Math.PI*2);ctx.stroke();
  ctx.restore();
  // "ZAP!" indicator for the player only (so you can see your own status without distraction from CPU's)
  if(showZap&&pl.frozen>90){
    ctx.save();ctx.textAlign='center';ctx.font='bold 14px monospace';
    ctx.fillStyle='#ffeb3b';ctx.shadowColor='#000';ctx.shadowBlur=6;
    ctx.fillText('ZAP!',pl.x,pl.y-pl.r-10);
    ctx.restore();
  }
}
function drawDiver(p,fill,dark,facing){
  const f=facing,s=p.r/16;ctx.save();ctx.translate(p.x,p.y);ctx.scale(s,s);ctx.rotate(p.vx*.035);
  ctx.shadowColor=fill;ctx.shadowBlur=18;ctx.fillStyle=fill;ctx.beginPath();ctx.ellipse(0,4,11,14,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=dark;ctx.beginPath();ctx.ellipse(-f*13,3,4,9,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1a2a38';ctx.beginPath();ctx.arc(-f*13,-5,3,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=10;ctx.fillStyle='#10202e';ctx.beginPath();ctx.arc(0,-11,13,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1e3040';ctx.beginPath();ctx.arc(0,-11,13,Math.PI*.58,Math.PI*2.42);ctx.arc(0,-11,10.5,Math.PI*2.42,Math.PI*.58,true);ctx.fill();
  ctx.shadowColor=fill;ctx.shadowBlur=12;ctx.fillStyle=fill+'99';const va=f>0?0:Math.PI;ctx.beginPath();ctx.arc(f*2,-11,9,va-1.55,va+1.55);ctx.lineTo(f*2,-11);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.22)';ctx.beginPath();ctx.ellipse(f*5,-14,3,1.8,-0.35,0,Math.PI*2);ctx.fill();
  const bt=tick%36;if(bt<16){ctx.globalAlpha=(1-bt/16)*.6;ctx.strokeStyle='rgba(180,230,255,.85)';ctx.lineWidth=.8;ctx.beginPath();ctx.arc(f*12+Math.sin(bt),-11-bt*.65,2.5,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;}
  const kk=Math.sin(tick*.14)*4;ctx.fillStyle=dark;ctx.shadowColor=fill;ctx.shadowBlur=5;ctx.beginPath();ctx.ellipse(-3,23+kk,5,10,.28,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(3,23-kk,5,10,-.28,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
